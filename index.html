<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج تسجيل الأنشطة التجارية </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h2 i { color: #667eea; }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .form-group { margin-bottom: 5px; }
        .full-width { grid-column: span 2; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 15px;
        }
        label i {
            margin-left: 8px;
            color: #667eea;
            width: 20px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
            background-color: #f9f9f9;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        textarea { resize: vertical; min-height: 100px; }
        .location-btn {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1a3b2e;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            width: 100%;
        }
        .location-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 233, 123, 0.3);
        }
        .location-note {
            font-size: 13px;
            color: #2c3e50;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: #f0f4f8;
            padding: 8px 12px;
            border-radius: 30px;
        }
        .location-note i { color: #667eea; }
        button[type="submit"] {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 25px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 50px;
            display: none;
            text-align: center;
            font-weight: 500;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .note {
            font-size: 13px;
            color: #7f8c8d;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .note i { color: #667eea; font-size: 14px; }
        .meter-group { grid-column: span 2; }
        .image-group {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .image-upload {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .image-upload:hover {
            border-color: #667eea;
        }
        .image-upload i {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .image-upload span {
            display: block;
            font-size: 14px;
            color: #555;
        }
        .image-upload input {
            display: none;
        }
        .image-preview {
            max-width: 100%;
            max-height: 100px;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
        }
        .image-filename {
            font-size: 12px;
            color: #2c3e50;
            margin-top: 5px;
            word-break: break-all;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width, .meter-group, .image-group { grid-column: span 1; }
            .image-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2><i class="fas fa-clipboard-list"></i> تسجيل النشاط التجاري</h2>
        <form id="dataForm">
            <div class="form-grid">
                <!-- رقم العداد -->
                <div class="form-group meter-group">
                    <label><i class="fas fa-tachometer-alt"></i> رقم العداد</label>
                    <input type="text" id="meterNumber" name="meterNumber" placeholder="أدخل رقم العداد إن وجد">
                    <div class="note"><i class="fas fa-info-circle"></i> إذا لم يكن موجوداً اتركه فارغاً</div>
                </div>
                <!-- التصنيف الرئيسي -->
                <div class="form-group">
                    <label><i class="fas fa-tags"></i> التصنيف الرئيسي</label>
                    <select id="mainCategory" name="mainCategory" required>
                        <option value="">-- اختر التصنيف الرئيسي --</option>
                    </select>
                </div>
                <!-- التصنيف الفرعي -->
                <div class="form-group">
                    <label><i class="fas fa-tag"></i> التصنيف الفرعي</label>
                    <select id="subcategory" name="subcategory" required>
                        <option value="">-- اختر التصنيف الرئيسي أولاً --</option>
                    </select>
                </div>
                <!-- نوع العميل -->
                <div class="form-group">
                    <label><i class="fas fa-user-tie"></i> نوع العميل</label>
                    <select id="customerType" name="customerType" required>
                        <option value="">-- اختر نوع العميل --</option>
                        <option value="سكنى">سكنى</option>
                        <option value="حكومى">حكومى</option>
                        <option value="تجارى">تجارى</option>
                        <option value="تجارى سكنى">تجارى سكنى</option>
                    </select>
                </div>
                <!-- رخصة النشاط التجاري -->
                <div class="form-group">
                    <label><i class="fas fa-file-alt"></i> رخصة النشاط التجاري</label>
                    <input type="text" id="license" name="license" placeholder="رقم الترخيص">
                </div>
                <!-- الميداني -->
                <div class="form-group">
                    <label><i class="fas fa-user"></i> الميداني</label>
                    <select id="fieldOfficer" name="fieldOfficer" required>
                        <option value="">-- اختر الميداني --</option>
                        <option value="ناصر الشهيل">ناصر الشهيل</option>
                        <option value="سعود الشقير">سعود الشقير</option>
                        <option value="فريح الرشيدي">فريح الرشيدي</option>
                        <option value="احمد السويدي">احمد السويدي</option>
                        <option value="مفلح الشمري">مفلح الشمري</option>
                        <option value="علي الرشيدان">علي الرشيدان</option>
                    </select>
                </div>
                <!-- خط العرض -->
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> خط العرض (Latitude)</label>
                    <input type="text" id="latitude" name="latitude" placeholder="مثال: 24.7136" readonly required>
                </div>
                <!-- خط الطول -->
                <div class="form-group">
                    <label><i class="fas fa-map-pin"></i> خط الطول (Longitude)</label>
                    <input type="text" id="longitude" name="longitude" placeholder="مثال: 46.6753" readonly required>
                </div>
                <!-- زر جلب الموقع -->
                <div class="form-group full-width">
                    <button type="button" class="location-btn" id="getLocationBtn">
                        <i class="fas fa-location-dot"></i> جلب الموقع الحالي (بدقة أقل من 10 أمتار)
                    </button>
                    <div class="location-note" id="locationStatus">
                        <i class="fas fa-info-circle"></i> لم يتم تحديد الموقع بعد.
                    </div>
                </div>
                <!-- حقل الصور (ثلاث صور) -->
                <div class="image-group">
                    <div class="image-upload" id="upload1" onclick="document.getElementById('image1').click()">
                        <i class="fas fa-camera"></i>
                        <span>الصورة 1</span>
                        <input type="file" id="image1" accept="image/*" capture="environment">
                        <img class="image-preview" id="preview1">
                        <div class="image-filename" id="filename1"></div>
                    </div>
                    <div class="image-upload" id="upload2" onclick="document.getElementById('image2').click()">
                        <i class="fas fa-camera"></i>
                        <span>الصورة 2</span>
                        <input type="file" id="image2" accept="image/*" capture="environment">
                        <img class="image-preview" id="preview2">
                        <div class="image-filename" id="filename2"></div>
                    </div>
                    <div class="image-upload" id="upload3" onclick="document.getElementById('image3').click()">
                        <i class="fas fa-camera"></i>
                        <span>الصورة 3</span>
                        <input type="file" id="image3" accept="image/*" capture="environment">
                        <img class="image-preview" id="preview3">
                        <div class="image-filename" id="filename3"></div>
                    </div>
                </div>
                <!-- الملاحظات -->
                <div class="form-group full-width">
                    <label><i class="fas fa-pen"></i> الملاحظات</label>
                    <textarea id="notes" name="notes" placeholder="أي ملاحظات إضافية..."></textarea>
                </div>
            </div>
            <button type="submit" id="submitBtn"><i class="fas fa-paper-plane"></i> إرسال البيانات</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        (function() {
            // مفتاح API لخدمة ImgBB
            const IMGBB_API_KEY = '943880b0a24534cdb564d3ad6ea8f3a8';

            // ---------- تعريف التصنيفات ----------
            const categories = {
                "السياحة والضيافة والترفيه والتسلية": [
                    "الأندية الرياضية ( كرة قدم - بادل )",
                    "الفنادق والمنتجعات",
                    "مجمّعات شقق للإيجار",
                    "المطاعم والكوفيهات ( الشاي - القهوة )"
                ],
                "خدمات الرعاية الصحية": [
                    "المستشفيات والمستوصفات",
                    "عيادات التجميل"
                ],
                "الخدمات التعليمية": [
                    "المدارس - والجامعات"
                ],
                "التجميل ومستحضراته": [
                    "الصالون النسائية والصالونات الرجالية",
                    "مراكز الاسترخاء ( مساج )"
                ],
                "القطاع الزراعي / الحدائق / المشاتل / الحيوانات": [
                    "القطاع الزراعي / ري الحدائق / المشاتل",
                    "تربية الحيوانات / بيع الحيوانات"
                ],
                "قطاع الأطعمة": [
                    "الملاحم",
                    "تصنيع الأغذية ( مثل اللحوم ومنتجات الألبان - الأطعمة المعلبة والمجمدة )",
                    "المسالخ",
                    "مصانع الثلج"
                ],
                "خدمات التنظيف": [
                    "غسل المركبات",
                    "مغاسل الملابس"
                ],
                "قطاع السيارات": [
                    "ورش تصليح السيارات"
                ],
                "صناعة المنسوجات": [
                    "مصانع الخشب ( الكنبات والاثاث )"
                ]
            };

            // تعبئة التصنيف الرئيسي
            const mainCatSelect = document.getElementById('mainCategory');
            for (let cat in categories) {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                mainCatSelect.appendChild(option);
            }

            const subCatSelect = document.getElementById('subcategory');

            // تحديث التصنيف الفرعي
            mainCatSelect.addEventListener('change', function() {
                const selected = this.value;
                subCatSelect.innerHTML = '';
                if (selected && categories[selected]) {
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = '-- اختر التصنيف الفرعي --';
                    subCatSelect.appendChild(defaultOption);
                    categories[selected].forEach(sub => {
                        const option = document.createElement('option');
                        option.value = sub;
                        option.textContent = sub;
                        subCatSelect.appendChild(option);
                    });
                } else {
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = '-- اختر التصنيف الرئيسي أولاً --';
                    subCatSelect.appendChild(defaultOption);
                }
            });

            // ---------- جلب الموقع ----------
            const latInput = document.getElementById('latitude');
            const lngInput = document.getElementById('longitude');
            const locationStatus = document.getElementById('locationStatus');
            const locBtn = document.getElementById('getLocationBtn');

            locBtn.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    locationStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> المتصفح لا يدعم تحديد الموقع.';
                    return;
                }
                locationStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الحصول على الموقع...';
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        const acc = pos.coords.accuracy;
                        latInput.value = lat.toFixed(6);
                        lngInput.value = lng.toFixed(6);
                        if (acc <= 10) {
                            locationStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#28a745;"></i> تم تحديد الموقع بدقة ${acc.toFixed(1)} متر (أقل من 10 أمتار).`;
                        } else {
                            locationStatus.innerHTML = `<i class="fas fa-exclamation-circle" style="color:#ffc107;"></i> تم تحديد الموقع بدقة ${acc.toFixed(1)} متر (قد تكون أكبر من 10 أمتار).`;
                        }
                    },
                    function(err) {
                        let msg = '';
                        switch(err.code) {
                            case err.PERMISSION_DENIED: msg = 'تم رفض الإذن بالوصول إلى الموقع.'; break;
                            case err.POSITION_UNAVAILABLE: msg = 'معلومات الموقع غير متوفرة.'; break;
                            case err.TIMEOUT: msg = 'انتهت مهلة محاولة الحصول على الموقع.'; break;
                            default: msg = 'حدث خطأ غير معروف.';
                        }
                        locationStatus.innerHTML = `<i class="fas fa-times-circle" style="color:#dc3545;"></i> ${msg}`;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            });

            // ---------- معاينة الصور ----------
            function setupImageUpload(inputId, previewId, filenameId) {
                const input = document.getElementById(inputId);
                const preview = document.getElementById(previewId);
                const filenameDiv = document.getElementById(filenameId);
                input.addEventListener('change', function() {
                    const file = this.files[0];
                    if (file) {
                        filenameDiv.textContent = file.name;
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            preview.src = e.target.result;
                            preview.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    } else {
                        preview.style.display = 'none';
                        filenameDiv.textContent = '';
                    }
                });
            }
            setupImageUpload('image1', 'preview1', 'filename1');
            setupImageUpload('image2', 'preview2', 'filename2');
            setupImageUpload('image3', 'preview3', 'filename3');

            // ---------- دالة رفع صورة إلى ImgBB ----------
            async function uploadImage(file) {
                const formData = new FormData();
                formData.append('image', file);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                if (!response.ok) {
                    throw new Error('فشل رفع الصورة');
                }
                const data = await response.json();
                return data.data.url; // رابط الصورة المباشر
            }

            // ---------- إرسال النموذج ----------
            const form = document.getElementById('dataForm');
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // إخفاء أي رسالة سابقة
                messageDiv.style.display = 'none';
                messageDiv.className = 'message';

                // التحقق الأساسي
                const mainCategory = document.getElementById('mainCategory').value;
                const subcategory = document.getElementById('subcategory').value;
                const customerType = document.getElementById('customerType').value;
                const fieldOfficer = document.getElementById('fieldOfficer').value;
                const latitude = document.getElementById('latitude').value;
                const longitude = document.getElementById('longitude').value;

                if (!mainCategory) return showMessage('الرجاء اختيار التصنيف الرئيسي', 'error');
                if (!subcategory) return showMessage('الرجاء اختيار التصنيف الفرعي', 'error');
                if (!customerType) return showMessage('الرجاء اختيار نوع العميل', 'error');
                if (!fieldOfficer) return showMessage('الرجاء اختيار الميداني', 'error');
                if (!latitude || !longitude) return showMessage('الرجاء تحديد الموقع باستخدام الزر أعلاه', 'error');

                // تعطيل الزر وتغيير النص
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري رفع الصور وإرسال البيانات...';

                // جمع الصور المرفوعة
                const imageInputs = [
                    document.getElementById('image1'),
                    document.getElementById('image2'),
                    document.getElementById('image3')
                ];

                const uploadPromises = imageInputs.map(input => {
                    if (input.files.length > 0) {
                        return uploadImage(input.files[0]).catch(err => {
                            console.error('خطأ في رفع الصورة:', err);
                            return null; // في حال فشل الرفع نعيد null
                        });
                    } else {
                        return Promise.resolve(''); // لا يوجد صورة
                    }
                });

                // انتظار رفع جميع الصور
                let imageUrls;
                try {
                    imageUrls = await Promise.all(uploadPromises);
                } catch (error) {
                    showMessage('❌ فشل في رفع الصور: ' + error.message, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البيانات';
                    return;
                }

                // إذا فشل رفع أي صورة (باستثناء الفارغة) نعطي تحذيراً لكن نكمل مع الصور الناجحة
                const failedUploads = imageUrls.filter((url, index) => url === null && imageInputs[index].files.length > 0);
                if (failedUploads.length > 0) {
                    showMessage(`⚠️ فشل رفع ${failedUploads.length} صورة، سيتم إرسال البيانات بدونها.`, 'error');
                }

                // تجهيز بيانات النموذج
                const formData = {
                    meterNumber: document.getElementById('meterNumber').value || '',
                    mainCategory: mainCategory,
                    subcategory: subcategory,
                    customerType: customerType,
                    license: document.getElementById('license').value || '',
                    fieldOfficer: fieldOfficer,
                    latitude: latitude,
                    longitude: longitude,
                    notes: document.getElementById('notes').value || '',
                    image1: imageUrls[0] || '',
                    image2: imageUrls[1] || '',
                    image3: imageUrls[2] || ''
                };

                // رابط التطبيق (استبدله برابطك)
                const scriptURL = 'https://script.google.com/macros/s/AKfycbxBn09wyq9SXbNQc_E7M4153bdEqwljVo7TXiz8YBGfmxYsq0JonyhW_sa_YQPd6hWODA/exec';

                try {
                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'cors',
                        redirect: 'follow',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(formData)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error ${response.status}`);
                    }

                    const result = await response.json();

                    if (result.result === 'success') {
                        showMessage('✅ تم إرسال البيانات بنجاح!', 'success');
                        form.reset();
                        // إعادة تعيين القوائم وحقول الموقع ومعاينات الصور
                        subCatSelect.innerHTML = '<option value="">-- اختر التصنيف الرئيسي أولاً --</option>';
                        latInput.value = '';
                        lngInput.value = '';
                        locationStatus.innerHTML = '<i class="fas fa-info-circle"></i> لم يتم تحديد الموقع بعد.';
                        // إخفاء معاينات الصور
                        document.getElementById('preview1').style.display = 'none';
                        document.getElementById('preview2').style.display = 'none';
                        document.getElementById('preview3').style.display = 'none';
                        document.getElementById('filename1').textContent = '';
                        document.getElementById('filename2').textContent = '';
                        document.getElementById('filename3').textContent = '';
                    } else {
                        showMessage('❌ فشل الإرسال: ' + (result.error || 'خطأ غير معروف'), 'error');
                    }
                } catch (error) {
                    console.error('خطأ في الإرسال:', error);
                    showMessage('❌ حدث خطأ: ' + error.message, 'error');
                } finally {
                    // إعادة تمكين الزر
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البيانات';
                }
            });

            function showMessage(text, type) {
                messageDiv.textContent = text;
                messageDiv.className = `message ${type}`;
            }
        })();
    </script>
</body>
</html>
